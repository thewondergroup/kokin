<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Page not found — Kokin</title>
<meta name="description" content="The page you're looking for isn't here. Find what you need from the Kokin homepage." />
<meta name="robots" content="noindex" />
<link rel="icon" type="image/png" href="/assets/Kokin-Logo-black.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">

<style>
:root {
  --bone: #f4ece0;
  --cream: #faf5ec;
  --ink: #1c1713;
  --ink-soft: #3a332c;
  --ash: #7a6f62;
  --ember: #b54a1f;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bone);
  color: var(--ink);
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  text-align: center;
  line-height: 1.6;
}

.wrap {
  max-width: 560px;
}

.logo {
  margin-bottom: 3rem;
}
.logo img {
  height: 48px;
  width: auto;
}

.kanji {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.25rem;
  font-weight: 300;
  color: var(--ash);
  letter-spacing: 0.4em;
  margin-bottom: 1.5rem;
}

h1 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: clamp(2.5rem, 6vw, 4rem);
  line-height: 1.1;
  margin-bottom: 3rem;
  color: var(--ink);
}
h1 em {
  font-style: italic;
  color: var(--ember);
}

p {
  color: var(--ink-soft);
  font-size: 1.05rem;
  margin-bottom: 2.5rem;
  max-width: 440px;
  margin-left: auto;
  margin-right: auto;
}

.links {
  display: flex;
  gap: 1rem;
  justify-content: center;
  flex-wrap: wrap;
}

.cta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  max-width: 480px;
  margin: 0 auto 2.5rem;
}

.cta-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1.5rem;
  background: var(--cream);
  border: 1px solid rgba(28, 23, 19, 0.08);
  text-decoration: none;
  transition: all 0.25s ease;
}

.cta-card:hover {
  background: var(--ink);
  border-color: var(--ink);
  transform: translateY(-2px);
}
.cta-card:hover .cta-kanji,
.cta-card:hover .cta-label {
  color: var(--cream);
}

.cta-kanji {
  font-family: 'Noto Serif JP', serif;
  font-weight: 300;
  font-size: 1.5rem;
  color: var(--ember);
  letter-spacing: 0.25em;
  margin-bottom: 0.75rem;
  transition: color 0.25s ease;
}

.cta-label {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: 1.5rem;
  color: var(--ink);
  transition: color 0.25s ease;
}

@media (max-width: 480px) {
  .cta-grid { grid-template-columns: 1fr; max-width: 320px; }
  .cta-card { padding: 1.5rem; }
  .cta-kanji { font-size: 1.25rem; margin-bottom: 0.5rem; }
  .cta-label { font-size: 1.25rem; }
}

a.btn {
  display: inline-block;
  padding: 0.9rem 2rem;
  border-radius: 999px;
  text-decoration: none;
  font-weight: 400;
  letter-spacing: 0.05em;
  font-size: 0.9rem;
  transition: all 0.2s ease;
}

a.btn-primary {
  background: var(--ink);
  color: var(--cream);
}
a.btn-primary:hover {
  background: var(--ember);
}

a.btn-secondary {
  background: transparent;
  color: var(--ink);
  border: 1px solid var(--ink);
}
a.btn-secondary:hover {
  background: var(--ink);
  color: var(--cream);
}

.quick-links {
  margin-top: 0;
  font-size: 0.8rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
.quick-links a {
  color: var(--ash);
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: all 0.2s ease;
  padding-bottom: 2px;
}
.quick-links a:hover {
  color: var(--ink);
  border-bottom-color: var(--ember);
}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo"><a href="/"><img src="/assets/Kokin-Logo-black.png" alt="Kokin 古今" /></a></div>
  <h1>What are you <em>looking for</em>?</h1>
  <div class="cta-grid">
    <a href="/menu" class="cta-card">
      <div class="cta-kanji">献 立</div>
      <div class="cta-label">Menu</div>
    </a>
    <a href="https://www.exploretock.com/kokin-london" class="cta-card" target="_blank" rel="noopener">
      <div class="cta-kanji">予 約</div>
      <div class="cta-label">Book a table</div>
    </a>
    <a href="/visit" class="cta-card">
      <div class="cta-kanji">所 在 地</div>
      <div class="cta-label">Visit</div>
    </a>
    <a href="/events" class="cta-card">
      <div class="cta-kanji">催 し</div>
      <div class="cta-label">What's on</div>
    </a>
  </div>
  <div class="quick-links">
    <a href="/">Back to home</a>
  </div>
</div>
</body>
</html>
